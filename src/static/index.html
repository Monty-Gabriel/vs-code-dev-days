<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mergington High School Activities</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <h1>Mergington High School</h1>
      <h2>Extracurricular Activities</h2>
    </header>

    <main>
      <section id="students-container">
        <h3>Student Management</h3>
        <form id="student-form">
          <div class="form-group">
            <label for="student-email">Email:</label>
            <input type="email" id="student-email" required placeholder="student@mergington.edu" />
          </div>
          <div class="form-group">
            <label for="student-name">Full Name:</label>
            <input type="text" id="student-name" required placeholder="Full Name" />
          </div>
          <div class="form-group">
            <label for="student-grade">Grade:</label>
            <input type="number" id="student-grade" required min="9" max="12" placeholder="9-12" />
          </div>
          <div class="form-group">
            <label for="student-phone">Contact Phone:</label>
            <input type="tel" id="student-phone" placeholder="(555) 555-5555" />
          </div>
          <div class="form-group">
            <label for="guardian-email">Guardian Email:</label>
            <input type="email" id="guardian-email" placeholder="guardian@email.com" />
          </div>
          <div class="form-group">
            <label for="health-notes">Health Notes:</label>
            <textarea id="health-notes" placeholder="Any health-related notes"></textarea>
          </div>
          <button type="submit">Add Student</button>
          <button type="button" id="update-student" style="display: none;">Update Student</button>
        </form>
        <div id="student-message" class="hidden"></div>
        
        <div id="students-list">
          <h4>Enrolled Students</h4>
          <div id="students-table">
            <!-- Students will be loaded here -->
            <p>Loading students...</p>
          </div>
        </div>
      </section>

      <section id="activities-container">
        <h3>Available Activities</h3>
        <div id="activities-list">
          <!-- Activities will be loaded here -->
          <p>Loading activities...</p>
        </div>
      </section>

      <section id="signup-container">
        <h3>Sign Up for an Activity</h3>
        <form id="signup-form">
          <div class="form-group">
            <label for="email">Student Email:</label>
            <input type="email" id="email" required placeholder="your-email@mergington.edu" />
          </div>
          <div class="form-group">
            <label for="activity">Select Activity:</label>
            <select id="activity" required>
              <option value="">-- Select an activity --</option>
              <!-- Activity options will be loaded here -->
            </select>
          </div>
          <button type="submit">Sign Up</button>
        </form>
        <div id="message" class="hidden"></div>
      </section>
    </main>

    <footer>
      <p>&copy; 2023 Mergington High School</p>
    </footer>

    <script src="app.js"></script>
  </body>
</html>
